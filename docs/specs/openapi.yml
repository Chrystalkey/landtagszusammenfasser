openapi: 3.0.0
info:
  title: "Specification for the Landtagszusammenfasser Project"
  version: "0.1.0"
  description: "Beschreibung der API des LTZF Projekts. Alle Listen, die vom Server kommen sind sortiert in\n  1. datum der letzten modifikation, absteigend\n  2. lexikographisch des titels falls nicht vorhanden"
paths:
  /api/v1/vorgang/{vorgang_id}:
    get:
      operationId: "vorgang_get_by_id"
      description: "Returns a vorgang by id"
      parameters:
        - name: "vorgang_id"
          in: "path"
          required: true
          schema:
            type: "string"
            format: "uuid"
        - $ref: "#/components/parameters/if-mod-since"
      responses:
        "200":
          description: "successful operation"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/vorgang"
        "304":
          description: "No new changes"
        "404":
          description: "Content not found"
    put:
      operationId: "vorgang_id_put"
      description: API Access for the Admins without the merge just replacing vorgang
      parameters:
        - name: "vorgang_id"
          in: "path"
          required: true
          description: "The API ID of the vorgang that is to be affected"
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/vorgang"
      responses:
        201:
          description: "Created"
        204:
          description: "Content Unchanged"
        401:
          $ref: "#/components/responses/UnauthorizedError"
      security:
        - apiKey: [] 
    delete:
      operationId: vorgang_delete
      parameters:
        - name: "vorgang_id"
          in: "path"
          required: true
          description: "API ID of the thing to be deleted"
          schema:
            type: "string"
            format: "uuid"
      responses:
        401:
          $ref: "#/components/responses/UnauthorizedError"
        204:
          description: "Deleted Successfully"
        404:
          description: "No Element with this ID"
      security:
        - apiKey: [] 
  /api/v1/vorgang:
    get:
      operationId: "vorgang_get"
      description: "Returns a filtered List of vorgang"
      responses:
        "200":
          $ref: "#/components/responses/VorgangGetResponse"
        "204":
          description: "No Content found for the specified parameters"
        "304":
          description: "No new changes"
        "416":
          description: "Request Range not satisfiable. Dates before the existence of the BRP or in the future are excluded for example"
        "400":
          description: "Bad Request"

      parameters:
        - $ref: "#/components/parameters/if-mod-since"
        - $ref: "#/components/parameters/updated-since"
        - $ref: "#/components/parameters/updated-until"
        - $ref: "#/components/parameters/parlament"
        - $ref: "#/components/parameters/wahlperiode"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
        - $ref: "#/components/parameters/initiator-contains"
        - $ref: "#/components/parameters/initiator-person-contains"
        - $ref: "#/components/parameters/vgtyp"
    put:
      operationId: "vorgang_put"
      description: "Pushing a new vorgang"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/vorgang"
      parameters:
        - name: "collector"
          in: query
          required: true
          schema:
            type: "string"
            format: "uuid"
      responses:
        "201":
          description: "Successfully Integrated the Object"
        "400": 
          description: "Bad Request"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "409": 
          description: "Conflict. This Vorgang-ID already exists"
      security:
        - apiKey: []
  /api/v1/auth:
    delete:
      operationId: "auth_delete"
      description: "Deletes an API Key from the Database"
      parameters:
        - name: "api-key-delete"
          in: "header"
          required: true
          description: "The API Key that is to be deleted"
          schema:
            type: "string"
      responses:
        "204":
          description: "API Key was deleted successfully"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          description: "API Key not found"
      security:
        - apiKey: [] 
    post:
      operationId: "auth_post"
      description: "Adds a new API Key to the Database"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/create_api_key"
      responses:
        "201":
          $ref: "#/components/responses/ApiKeyCreated"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
      security:
        - apiKey: [] 
  /api/v1/sitzung:
    get:
      operationId: "s_get"
      description: "Gibt eine Liste gefilterter Sitzungen zurück"
      parameters:
        - $ref: "#/components/parameters/if-mod-since"
        - $ref: "#/components/parameters/updated-since"
        - $ref: "#/components/parameters/updated-until"
        - $ref: "#/components/parameters/parlament"
        - $ref: "#/components/parameters/gremium-includes"
        - $ref: "#/components/parameters/wahlperiode"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
        - $ref: "#/components/parameters/vorgang-id"
        - $ref: "#/components/parameters/vgtyp"

      responses:
        "200":
          $ref: "#/components/responses/SGetResponse"
        "204":
          description: "No Content found for the specified parameters"
        "304":
          description: "No new changes"
        "416":
          description: "Request Range not satisfiable. Dates before the existence of the BRP or in the future are excluded for example"
        "400":
          description: "Bad Request"

    put:
      operationId: "s_put"
      description: "Neue Sitzung Bekanntmachen"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/sitzung"
      parameters:
        - name: "collector"
          in: query
          required: true
          schema:
            type: "string"
            format: "uuid"
      responses:
        "201":
          description: "Successfully Integrated the Object"
        "400":
          description: "Bad Request"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "409":
          description: "Konflikt: Datensätze nicht Vereinbar"
      security:
        - apiKey: []
  /api/v1/sitzung/{s_id}:
    get:
      operationId: "s_get_by_id"
      description: "Gibt Sitzung mit dieser ID zurück"
      parameters:
        - name: "s_id"
          in: "path"
          required: true
          schema:
            type: "string"
            format: "uuid"
        - $ref: "#/components/parameters/if-mod-since"
      responses:
        "200":
          description: "successful operation"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/sitzung"
        "404":
          description: "Content not found"
    put:
      operationId: "s_id_put"
      description: API Access for the Admins without the merge just replacing vorgang
      parameters:
        - name: "s_id"
          in: "path"
          required: true
          description: "The API ID of the sitzung that is to be affected"
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/sitzung"
      responses:
        201:
          description: "Created"
        204:
          description: "Content Unchanged"
        401:
          $ref: "#/components/responses/UnauthorizedError"
      security:
        - apiKey: [] 
    delete:
      operationId: s_delete
      parameters:
        - name: "s_id"
          in: "path"
          required: true
          description: "API ID of the Sitzung to be deleted"
          schema:
            type: "string"
            format: "uuid"
      responses:
        401:
          $ref: "#/components/responses/UnauthorizedError"
        204:
          description: "Deleted Successfully"
        404:
          description: "No Element with this ID"
      security:
        - apiKey: []
components:
  parameters:
    gremium-includes:
      name: "gremium"
      in: query
      required: false
      schema:
        type: string
        description: "Name oder Teil eines Namens eines Gremiums. Wird best-effort gematcht."
    if-mod-since:
      name: "If-Modified-Since"
      in: "header"
      description: "Returns all elements that were updated after the specified time stamp"
      required: false
      schema:
        type: string
        format: date-time
    updated-since:
      name: "upd-since"
      in: "query"
      description: "inclusive range"
      required: false
      schema:
        type: string
        format: date-time
    updated-until:
      name: "upd-until"
      in: "query"
      description: "inclusive range"
      required: false
      schema:
        type: string
        format: date-time
    wahlperiode:
      name: "wp"
      in: "query"
      required: false
      schema:
        type: integer
        minimum: 0
    limit:
      name: "limit"
      in: "query"
      required: false
      schema:
        type: integer
        minimum: 0
        maximum: 64
    offset:
      name: "offset"
      in: "query"
      required: false
      schema:
        type: integer
        minimum: 0
    vgtyp:
      name: "vgtyp"
      in: "query"
      required: false
      schema:
        $ref: "#/components/schemas/vorgangstyp"
    parlament:
      name: "parlament"
      in: "query"
      required: false
      schema:
        $ref: "#/components/schemas/parlament"
    initiator-contains:
      name: "init-contains"
      in: "query"
      required: false
      schema:
        type: string
    initiator-person-contains:
      name: "init-prsn-contains"
      in: "query"
      required: false
      schema:
        type: string
    vorgang-id:
      name: "vgid"
      in: "query"
      required: false
      description: "Assoziierter Vorgang"
      schema:
        type: string
        format: uuid
  securitySchemes:
    apiKey:
      description: API key of the Collector
      type: apiKey
      name: X-API-Key
      in: header
  responses:
    UnauthorizedError:
      description: API key is missing or invalid
    ApiKeyCreated:
      description: "API Key was created successfully"
      content:
        text/plain:
          schema:
            type: string
            description: "The API Key that was created"
    VorgangGetResponse:
      description: "Antwort auf eine gefilterte Anfrage zu Vorgang"
      content:
        application/json:
          schema:
            type: "object"
            properties:
              payload: 
                type: "array"
                items:
                  $ref: "#/components/schemas/vorgang"
    SGetResponse:
      description: "Antwort auf eine gefilterte Anfrage zu Sitzungen"
      content:
        application/json:
          schema:
            type: "object"
            properties:
              payload:
                type: "array"
                items:
                  $ref: "#/components/schemas/sitzung"
  schemas:
    create_api_key:
      type: "object"
      required:
        - "scope"
      properties:
        scope:
          type: "string"
          enum:
            - "admin"
            - "collector"
            - "keyadder"
        expires_at:
          type: "string"
          format: "date-time"
          description: "The expiration date of the API Key"
    parlament:
      type: "string"
      enum:
        - "BT" # Bundestag
        - "BR" # Bundesrat
        - "BV" # Bundesversammlung
        - "EK" # Europakammer des Bundesrats
        - "BB" # Brandenburg
        - "BY" # Bayern
        - "BE" # Berlin
        - "HB" # Hansestadt Bremen
        - "HH" # Hansestadt Hamburg
        - "HE" # Hessen
        - "MV" # Mecklenburg-Vorpommern
        - "NI" # Niedersachsen
        - "NW" # Nordrhein-Westfahlen
        - "RP" # Rheinland-Pfalz
        - "SL" # Saarland
        - "SN" # Sachsen
        - "TH" # Thüringen
        - "SH" # Schleswig-Holstein
        - "BW" # Baden Württemberg
        - "ST" # Sachsen Anhalt
    ### start der guarded enumerations
    vorgangstyp:
      type: "string"
      enum:
        - "gg-einspruch"    # Bundesgesetz Einspruch
        - "gg-zustimmung"   # Bundesgesetz Zustimmungspflich
        - "gg-land-parl"    # Landesgesetz, normal
        - "gg-land-volk"    # Landesgesetz, Volksgesetzgebung
        - "antrag"          # Allgemeiner Antrag
        - "anfrage"         # Anfrage
        - "sonstig"         # other, email me
      description: "Der Track auf dem wir uns befinden. Zum Beispiel: Gesetzgebung - Einspruchsgesetz. Legt fest, welche Stationen hier möglich sind zusammen mit den Parlamenten in den Stationen"
    stationstyp:
      description: "Stationen, die ein Gesetz in verschiedenen Ausformungen durchlaufen kann. Im Prinzip ist die Festlegung auf Prä / Postparlamentarisch arbiträr."
      type: "string"
      enum:
        - "preparl-eckpup" # Eckpunktepapier / Parlamentsentwurf
        - "preparl-regent" # Referentenentwurf / Regierungsentwurf
        - "preparl-regbsl" # Kabinettsbeschluss / Regierungsbeschluss
        - "preparl-vbegde" # Volksbegehren / Diskussionsentwurf
        - "parl-initiativ" # Gesetzesinitiative
        - "parl-ausschber" # Beratung im Ausschuss
        - "parl-vollvlsgn" # Vollversammlung / Lesung
        - "parl-akzeptanz" # Schlussabstimmung & Akzeptanz des Parlaments
        - "parl-ablehnung" # Schlussabstimmung & Ablehnung des Parlaments
        - "parl-zurueckgz" # "Plenarsitzung & Rückzug des Vorhabens"
        - "parl-ggentwurf" # Gegenentwurf des Parlaments auf abgel. Volksbegehren
        - "postparl-vesja" # Volksentscheid nach Parlamentsbeschluss & Akzeptanz
        - "postparl-vesne" # Volksentscheid nach Parlamentsbeschluss & Ablehnung
        - "postparl-gsblt" # Veröffentlichung im Gesetzesblatt
        - "postparl-kraft" # In Kraft getreten
        - "sonstig"        # other, email me
    vg_ident_typ:
      description: "Typ von Identifikatoren für einen gesamten Vorgang"
      type: "string"
      enum: ["initdrucks", "vorgnr", "api-id", "sonstig"]
    doktyp:
      description: "Dokumententyp"
      type: "string"
      enum: 
        - "preparl-eckpnkt"  # Eckpunktepapier
        - "preparl-entwurf"  # Vorparlamentarischer Entwurf
        - "antrag"           # Anträge
        - "anfrage"          # Große und kleine Anfragen
        - "entwurf"          # Gesetzesentwurf auf einer Drucksache
        - "mitteilung"       # Mitteilung über z.B. Rücknahme
        - "beschlussempf"    # Beschlussempfehlung von Ausschüssen
        - "stellungnahme"    # Stellungnahme von Personen oder Organisationen
        - "gutachten"        # Gutachten die im Auftrag des Parlaments erstellt werden
        - "plenar-protokoll" # Plenarprotokoll
        - "plenar-tops"      # Plenarprotokoll TOPs
        - "as-tops"          # Ausschuss TOPs
        - "as-tops-aend"     # Ausschuss TOPs Änderung
        - "as-tops-ergz"     # Ausschuss TOPs Ergänzung
        - "sonstig"          # Sonstiges
    gremium:
      type: "object"
      required:
        - "parlament"
        - "name"
        - "wahlperiode"
      properties:
        parlament:
          $ref: "#/components/schemas/parlament"
        wahlperiode:
          type: integer
          minimum: 0
        link:
          type: "string"
          format: "url"
        link_kalender:
          type: "string"
          format: "url"
        name:
          description: "Name des betreffenden Gremiums. 'plenum', 'regierung', 'volk' sind reservierte namen"
          example: "Ausschuss für Inneres und Gemüseauflauf"
          type: "string"
    ### ende der guarded enumerations
    dokument:
      type: "object"
      required:
        - "titel"
        - "volltext"
        - "hash"
        - "typ"
        - "erstellt_am"
        - "letztes_update"
        - "link"
      properties:
        api_id:
          type: "string"
          format: "uuid"
          description: "optional, here for future references. Is generated by the server."
        drucksnr:
          type: "string"
        typ:
          $ref: "#/components/schemas/doktyp"
        titel:
          type: "string"
          description: "Offizieller Titel"
        kurztitel:
          type: "string"
          description: "Griffigerer Titel für besseres Verständnis"
        vorwort:
          type: "string"
          description: "Präambel, Vorwort oder Intentionsbeschreibung. Wird für Ähnlichkeitsanalysen genutzt"
        volltext:
          type: "string"
          description: "Volltext des Dokuments"
        zusammenfassung:
          type: "string"
        referenzdatum:
          type: string
          format: date-time
          description: "Datum, auf das sich das Dokument bezieht"
          example: "Plenarprotokoll für Sitzung am ==7.3.==, wurde erstellt am 8.3."
        erstellt_am:
          type: string
          format: date-time
          example: "Dateierstellungsdatum"
        letztes_update:
          type: "string"
          format: "date-time"
          example: "Letzte Modifikation der Datei"
        meinung:
          type: "integer"
          description: "Meinungsbild des Dokuments. (z.B. Stellungnahme, Beschlussempfehlung) Intervall [1;5]. Falls Beschlussempfehlung: 1=ablehnung, 2-4: zstm in geänderter Fassung, 5: Zustimmung"
          minimum: 1
          maximum: 5
        link:
          type: "string"
          format: "uri"
        hash:
          type: "string"
        schlagworte:
          type: "array"
          items:
            type: "string"
        autoren:
          type: "array"
          example: "Ach, Manfred; Staatsregierung; Fraktion die Grünen; Fraktion CDU/CSU"
          items:
            $ref: "#/components/schemas/autor"
        redepunkte:
          type: array
          description: "Falls Redeprotokoll: Liste an Redepunkten. Am Dokument da in Station zu unspezifisch"
          items:
            $ref: "#/components/schemas/redepunkt"
    redepunkt:
      type: object
      description: "Redebeitrag einer Plenar- oder Ausschusssitzung"
      properties:
        redner:
          type: string
        redezeit:
          type: integer
          minimum: 0
          description: "Redezeit in Sekunden"
        organisation:
          type: string
          description: "Zugehörigkeit des Redners, Kontextabhängig"
          example: "CDU; Agora Energiewende; Fraktion Linke/Die Partei/ÖDP"
    dok_ref:
      oneOf:
        - $ref: "#/components/schemas/dokument"
        - type: "string"
          format: uuid
          description: "API ID eines schon vorher hochgeladenes Dokuments"
    autor:
      type: "object"
      description: "Autor mit Kontext"
      required:
        - organisation
      properties:
        organisation:
          type: string
        person:
          type: string
        fachgebiet:
          type: string
        lobbyregister:
          type: "string"
          format: "uri"
          description: "Link zum Lobbyregister wenn anwendbar"
    station:
      type: "object"
      description: "Station ist in vielerlei hinsicht das Kernstück der API der Vorgänge. Jeder Vorgang besteht aus Stationen und die Stationen haben nur wenige verpflichtende Datenfelder.\
                    Für weitere Details, siehe die docs"
      required:
        - "typ"
        - "dokumente"
        - "start_zeitpunkt"
        - "parlament"
      properties:
        titel:
          type: "string"
          description: "Optionaler Titel, falls die restlichen Daten keinen hinreichenden Rückschluss zulassen"
        api_id:
          type: "string"
          format: "uuid"
          description: "optional, here for future references. Is generated by the server."
        start_zeitpunkt:
          type: "string"
          format: "date-time"
          description: "Datum an dem die erste Aktion dieser Station erstellt wurde"
          example: "Erstes Sitzungsdatum des Ausschusses"
        letztes_update:
          type: "string"
          format: "date-time"
          description: "Letztes relevantes Datum an dem die Station angefasst wurde"
          example: "letzte Ausschusssitzung oder nächste geplante Ausschusssitzung"
        gremium:
          $ref: "#/components/schemas/gremium"
        gremium_federf:
          type: boolean
          description: "Ist die Station eine Ausschussberatung gibt dieses Feld an ob es im Federführenden Ausschuss ist"
        dokumente:
          type: "array"
          items:
            $ref: "#/components/schemas/dok_ref"
        link:
          type: "string"
          format: "uri"
          description: "Link zu einer Übersichtsseite zu dieser Station. _NICHT_ zu einem Dokument (PDF)"
        additional_links:
          type: "array"
          items:
            type: "string"
            format: "uri"
            description: "Weitere Links zu interessanten Infos für diese Station"
            example: "Link zu einem Videomitschnitt der betreffenden Plenarsitzung"
        parlament:
          $ref: "#/components/schemas/parlament"
        schlagworte:
          type: "array"
          items:
            type: "string"
            format: "lowercase"
        stellungnahmen:
          type: "array"
          items:
            $ref: "#/components/schemas/dokument"
        typ:
          $ref: "#/components/schemas/stationstyp"
        trojanergefahr:
          description: "Zahl im Intervall [1;10], die die Gefahr einer Schummelei angeben"
          type: "integer"
          minimum: 1
          maximum: 10
    vorgang:
      type: "object"
      required:
        - "api_id"
        - "titel"
        - "typ"
        - "wahlperiode"
        - "verfassungsaendernd"
        - "initiatoren"
        - "stationen"
      properties:
        api_id:
          type: "string"
          format: "uuid"
          example: "123e4567-e89b-12d3-a456-426614174000"
        titel:
          type: "string"
        kurztitel:
          type: "string"
        wahlperiode:
          type: "integer"
          description: "Nummer der Wahlperiode, in der der Vorgang stattfindet"
          minimum: 0
        verfassungsaendernd:
          type: "boolean"
        initiatoren:
          example: "Staatsministerium für Justiz"
          description: "Initiatoren des Vorgangs, ob Institution oder Person"
          type: "array"
          items:
            $ref: "#/components/schemas/autor"
        typ:
          $ref: "#/components/schemas/vorgangstyp"
        ids:
          type: "array"
          items:
            $ref: "#/components/schemas/vg_ident"
        links:
          type: "array"
          items:
            type: "string"
            format: "uri"
        stationen:
          type: "array"
          items:
            $ref: "#/components/schemas/station"
    vg_ident:
      type: "object"
      required:
        - "id"
        - "typ"
      properties:
        id: 
          type: "string"
          example: "123e4567-e"
        typ:
          $ref: "#/components/schemas/vg_ident_typ"

    top:
      type: "object"
      description: "Ein Tagesordnungspunkt. Muss Nummer und Titel enthalten, für den Rest siehe unten."
      required: 
        - "nummer"
        - "titel"
      properties:
        nummer:
          type: "integer"
          minimum: 0
          description: "Nummer des TOPs in einer Sitzung"
        titel:
          type: "string"
        vorgang_id:
          description: "Die Nummer assoziierter Vorgänge. Wird beim Upload ignoriert, aber beim Download mitgegeben zusammen mit den konkreten Drucksachen"
          type: "array"
          items:
            type: "string"
            format: "uuid"
        dokumente:
          type: "array"
          description: "Die Dokumente, die in diesem TOP besprochen werden sollen"
          items:
            $ref: "#/components/schemas/dok_ref"
    sitzung:
      type: "object"
      description: "Sitzung oder Anhörung. Eine Anhörung wird es, wenn Experten geladen werden im Ausschuss"
      required:
        - "termin"
        - "gremium"
        - "nummer"
        - "tops"
        - "public"
        - "ankuendigungen"
      properties:
        api_id:
          type: "string"
          format: "uuid"
          description: "optional, here for future references. Is generated by the server."
        public:
          type: "boolean"
        termin:
          type: "string"
          format: "date-time"
        link:
          type: "string"
          format: "url"
        nummer:
          type: integer
          minimum: 0
        titel:
          type: "string"
          description: "Titel wenn anwendbar. In den Ländern sind Themenüberschriften für Sitzungen üblich"
        gremium:
          $ref: "#/components/schemas/gremium"
        tops:
          type: "array"
          items:
            $ref: "#/components/schemas/top"
        ankuendigungen:
          type: array
          items:
            $ref: "#/components/schemas/dokument"
        experten:
          type: "array"
          description: "Optional: Liste von geladenen Experten. (macht aus der Sitzung eine Anhörung)"
          items:
            $ref: "#/components/schemas/autor"